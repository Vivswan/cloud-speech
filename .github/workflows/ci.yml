name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck (extension + web)
        run: bun run typecheck

      - name: Lint + format (biome check)
        run: bun run check

      - name: Test (with coverage thresholds)
        run: bun run test:coverage

      # All three store listings zip from the same source; verify each zip's
      # manifest (version, name, no dev key) — the same smoke the release runs.
      - name: Build + zip all listings (polly / azure / cloud)
        run: bun run zip:all

      - name: Verify store zips
        run: bun run verify:zips

      - name: Build website
        run: bun run build:web

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-builds
          path: apps/extension/.output/chrome-mv3-*/
          retention-days: 7

  e2e-smoke:
    name: e2e smoke (loaded extension)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install chromium --with-deps
        working-directory: apps/extension

      # Loads the built extension into a real Chromium and drives the popup:
      # sidebar, Settings (4 providers + first-run), Preferences, Feedback.
      - name: Run extension UI smoke
        run: bun run test:e2e

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: raven-actions/actionlint@v2

  # Single aggregate gate: the ONLY CI context branch protection requires, so
  # adding/renaming jobs never desyncs the required checks.
  all-green:
    name: all-green
    if: always()
    needs: [check, e2e-smoke, actionlint]
    runs-on: ubuntu-latest
    steps:
      - name: Require all CI jobs to have succeeded
        run: |
          results="${{ join(needs.*.result, ',') }}"
          echo "needs results: $results"
          case ",$results," in
            *,failure,* | *,cancelled,* | *,skipped,*)
              echo "::error::a required CI job did not succeed ($results)"; exit 1 ;;
          esac
          echo "all required CI jobs succeeded"

  release-please:
    name: release-please
    needs: all-green
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    uses: ./.github/workflows/release-please.yml
    permissions:
      contents: write
      pull-requests: write
      issues: write
      # Reusable workflows cannot ELEVATE caller permissions — the nested
      # Pages deployment (release → deploy-web) needs these granted here.
      pages: write
      id-token: write
    secrets: inherit
