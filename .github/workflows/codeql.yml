name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 4 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: analyze (javascript-typescript)
    # Code scanning requires a public repo (or GHAS); skip gracefully if private.
    if: github.event.repository.private == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v7

      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # Reference forks are vendored for comparison only, not shipped code.
          config: |
            paths-ignore:
              - sources

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
